<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMAIL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f8;height:100vh;display:flex;overflow:hidden;}

/* SIDEBAR */
#sidebar{
  width:220px;background:#fff;display:flex;flex-direction:column;
  box-shadow:2px 0 20px rgba(0,0,0,.06);flex-shrink:0;z-index:10;
}
.logo{padding:22px 20px 16px;display:flex;align-items:center;gap:10px;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#6c63ff,#a855f7);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:900;flex-shrink:0;}
.logo-text{font-size:20px;font-weight:900;color:#1a1a2e;letter-spacing:-0.5px;}
.logo-text span{color:#6c63ff;}

.compose-btn{
  margin:4px 14px 16px;background:linear-gradient(135deg,#6c63ff,#a855f7);
  border:none;border-radius:14px;color:#fff;padding:12px 18px;
  font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(108,99,255,.35);transition:all .2s;
}
.compose-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.45);}

.folder{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  font-size:13.5px;color:#64748b;cursor:pointer;border-radius:12px;
  margin:1px 8px;transition:all .15s;position:relative;
}
.folder:hover{background:#f5f3ff;color:#6c63ff;}
.folder.active{background:linear-gradient(135deg,rgba(108,99,255,.12),rgba(168,85,247,.08));color:#6c63ff;font-weight:600;}
.folder .f-icon{font-size:16px;width:22px;text-align:center;}
.folder .badge{margin-right:auto;background:#6c63ff;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.sidebar-sep{height:1px;background:#f1f5f9;margin:8px 16px;}
.account{display:flex;align-items:center;gap:10px;padding:14px 16px;margin-top:auto;border-top:1px solid #f1f5f9;}
.av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#a855f7);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;}
.acc-name{font-size:13px;font-weight:600;color:#1e293b;}
.acc-addr{font-size:11px;color:#94a3b8;}

/* MAIL LIST */
#maillist{width:310px;background:#fff;border-right:1px solid #e8eaf0;display:flex;flex-direction:column;flex-shrink:0;}
.list-top{padding:16px 16px 10px;border-bottom:1px solid #f1f5f9;}
.list-top h2{font-size:17px;font-weight:800;color:#1e293b;}
.search-wrap{display:flex;align-items:center;gap:8px;background:#f8fafc;border-radius:12px;padding:9px 14px;margin:10px 12px;border:1.5px solid #e2e8f0;transition:border .2s;}
.search-wrap:focus-within{border-color:#6c63ff;}
.search-wrap input{background:none;border:none;outline:none;font-size:13px;color:#1e293b;flex:1;direction:rtl;}
.search-wrap input::placeholder{color:#94a3b8;}

.mail-item{padding:14px 16px 12px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .15s;position:relative;}
.mail-item:hover{background:#fafbff;}
.mail-item.active{background:linear-gradient(135deg,rgba(108,99,255,.07),rgba(168,85,247,.04));border-right:3px solid #6c63ff;}
.mail-item.unread .mi-from{font-weight:800;color:#1e293b;}
.mail-item.unread .mi-subject{font-weight:700;color:#1e293b;}
.mi-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.mi-from{font-size:13.5px;font-weight:600;color:#374151;}
.mi-time{font-size:11px;color:#94a3b8;}
.mi-subject{font-size:12.5px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.mi-preview{font-size:11.5px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.unread-dot{width:8px;height:8px;background:#6c63ff;border-radius:50%;position:absolute;top:50%;left:10px;transform:translateY(-50%);}

.mail-scroll-list{flex:1;overflow-y:auto;}
.mail-scroll-list::-webkit-scrollbar{width:3px;}
.mail-scroll-list::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:3px;}

/* READING PANE */
#reading{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f8faff;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#94a3b8;}
.empty-icon{font-size:72px;opacity:.25;}

#mail-view{display:none;flex-direction:column;flex:1;overflow:hidden;}

.mail-topbar{
  display:flex;align-items:center;gap:8px;padding:14px 24px;
  background:#fff;border-bottom:1px solid #e8eaf0;
}
.tb-btn{
  background:#f8fafc;border:1.5px solid #e2e8f0;color:#64748b;
  padding:7px 14px;border-radius:10px;font-size:12.5px;cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:all .2s;font-weight:500;
}
.tb-btn:hover{background:#f0f2ff;border-color:#6c63ff;color:#6c63ff;}
.tb-btn.red:hover{background:#fef2f2;border-color:#ef4444;color:#ef4444;}

.mail-reading{flex:1;overflow-y:auto;padding:28px 36px;}
.mail-reading::-webkit-scrollbar{width:4px;}
.mail-reading::-webkit-scrollbar-thumb{background:#e2e8f0;}

.mail-subject-h{font-size:24px;font-weight:800;color:#1e293b;line-height:1.3;margin-bottom:18px;}
.mail-meta-row{display:flex;align-items:center;gap:14px;padding-bottom:20px;border-bottom:1.5px solid #f1f5f9;margin-bottom:24px;}
.mail-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#fff;flex-shrink:0;}
.meta-name{font-size:14px;font-weight:700;color:#1e293b;}
.meta-addr{font-size:12px;color:#94a3b8;}
.meta-date{margin-right:auto;font-size:12px;color:#94a3b8;}
.mail-body-text{font-size:15px;line-height:1.85;color:#374151;white-space:pre-wrap;}

/* COMPOSE OVERLAY */
#compose-overlay{
  display:none;position:fixed;inset:0;z-index:2000;
  background:rgba(15,10,40,.45);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;
}
#compose-overlay.show{display:flex;}
#compose-box{
  background:#fff;border-radius:24px;width:560px;max-width:95vw;
  box-shadow:0 40px 100px rgba(0,0,0,.22);
  display:flex;flex-direction:column;overflow:hidden;
  animation:popIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

.c-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1.5px solid #f1f5f9;
}
.c-header h3{font-size:16px;font-weight:800;color:#1e293b;}
.c-close{background:none;border:none;font-size:20px;color:#94a3b8;cursor:pointer;line-height:1;padding:2px 6px;border-radius:6px;}
.c-close:hover{background:#fee2e2;color:#ef4444;}

.c-field{display:flex;align-items:center;gap:12px;padding:11px 22px;border-bottom:1px solid #f8fafc;}
.c-label{font-size:12px;font-weight:600;color:#94a3b8;width:36px;flex-shrink:0;}
.c-field input{background:none;border:none;outline:none;font-size:14px;color:#1e293b;flex:1;direction:rtl;}
.c-field input::placeholder{color:#c4ccd8;}

#c-body{
  background:none;border:none;outline:none;resize:none;
  padding:18px 22px;font-size:14.5px;color:#374151;
  min-height:200px;line-height:1.75;direction:rtl;width:100%;
  font-family:'Segoe UI',Arial,sans-serif;
}
#c-body::placeholder{color:#c4ccd8;}

.c-footer{
  display:flex;align-items:center;gap:8px;padding:14px 18px;
  border-top:1.5px solid #f1f5f9;background:#fafbff;
}
.send-btn{
  background:linear-gradient(135deg,#6c63ff,#a855f7);border:none;
  border-radius:12px;color:#fff;padding:11px 28px;font-size:14px;
  font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;
  box-shadow:0 4px 14px rgba(108,99,255,.3);transition:all .2s;
}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(108,99,255,.4);}
.draft-btn{background:#f8fafc;border:1.5px solid #e2e8f0;color:#64748b;padding:10px 16px;border-radius:12px;font-size:13px;cursor:pointer;font-weight:600;transition:all .2s;}
.draft-btn:hover{border-color:#6c63ff;color:#6c63ff;}

/* TOAST */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:#1e293b;color:#fff;padding:12px 24px;border-radius:14px;
  font-size:13.5px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.25);
  z-index:9999;animation:toastIn .3s ease;white-space:nowrap;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo">
    <div class="logo-icon">B</div>
    <div class="logo-text">B<span>MAIL</span></div>
  </div>

  <button class="compose-btn" onclick="openCompose()">✏️ כתוב מייל חדש</button>

  <div class="folder active" onclick="setFolder('inbox',this)">
    <span class="f-icon">📥</span> דואר נכנס
    <span class="badge" id="unread-badge">0</span>
  </div>
  <div class="folder" onclick="setFolder('starred',this)">
    <span class="f-icon">⭐</span> מסומנים
  </div>
  <div class="folder" onclick="setFolder('sent',this)">
    <span class="f-icon">📤</span> נשלח
  </div>
  <div class="folder" onclick="setFolder('drafts',this)">
    <span class="f-icon">📝</span> טיוטות
  </div>
  <div class="folder" onclick="setFolder('trash',this)">
    <span class="f-icon">🗑️</span> אשפה
  </div>

  <div class="sidebar-sep"></div>

  <div class="account">
    <div class="av">B</div>
    <div>
      <div class="acc-name">BirgsOS User</div>
      <div class="acc-addr">me@bmail.app</div>
    </div>
  </div>
</div>

<!-- MAIL LIST -->
<div id="maillist">
  <div class="list-top">
    <h2 id="folder-title">דואר נכנס</h2>
  </div>
  <div class="search-wrap">
    <span style="color:#94a3b8">🔍</span>
    <input type="text" placeholder="חפש מיילים..." oninput="searchMails(this.value)">
  </div>
  <div class="mail-scroll-list" id="mail-items"></div>
</div>

<!-- READING PANE -->
<div id="reading">
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">💌</div>
    <div style="font-size:17px;font-weight:700;color:#64748b">בחר מייל לקריאה</div>
    <div style="font-size:13px">או לחץ על ✏️ כדי לכתוב חדש</div>
  </div>

  <div id="mail-view">
    <div class="mail-topbar">
      <button class="tb-btn" onclick="replyMail()">↩️ השב</button>
      <button class="tb-btn" onclick="forwardMail()">↪️ העבר</button>
      <button class="tb-btn" onclick="starMail()">⭐ סמן</button>
      <button class="tb-btn red" onclick="deleteMail()">🗑 מחק</button>
    </div>
    <div class="mail-reading" id="mail-content"></div>
  </div>
</div>

<!-- COMPOSE -->
<div id="compose-overlay" onclick="if(event.target===this)closeCompose()">
  <div id="compose-box">
    <div class="c-header">
      <h3>✏️ מייל חדש</h3>
      <button class="c-close" onclick="closeCompose()">✕</button>
    </div>
    <div class="c-field">
      <span class="c-label">אל:</span>
      <input type="email" id="c-to" placeholder="כתובת המייל של הנמען...">
    </div>
    <div class="c-field">
      <span class="c-label">נושא:</span>
      <input type="text" id="c-subject" placeholder="נושא המייל...">
    </div>
    <textarea id="c-body" placeholder="כתוב את המייל שלך כאן..."></textarea>
    <div class="c-footer">
      <button class="send-btn" onclick="sendMail()">📤 שלח</button>
      <button class="draft-btn" onclick="saveDraft()">💾 שמור טיוטה</button>
    </div>
  </div>
</div>

<script>
const COLORS=['#6c63ff','#a855f7','#2563eb','#16a34a','#dc2626','#d97706','#0891b2'];
const avatarBg=n=>COLORS[n.charCodeAt(0)%COLORS.length];

let data=JSON.parse(localStorage.getItem('bmail2')||'null');
if(!data){
  data={
    inbox:[
      {id:1,from:'צוות BMAIL',addr:'team@bmail.app',subject:'ברוך הבא ל-BMAIL! 💌',body:'שלום,\n\nברוך הבא ל-BMAIL — מייל חכם ויפה מבית BirgsOS.\n\nתיבת הדואר שלך מוכנה לשימוש.\n\nלכתיבת מייל חדש — לחץ על הכפתור הסגול.\nלמחיקה — לחץ על 🗑 בסרגל הכלים.\n\nנשמח לשמוע ממך!\n\nצוות BMAIL',time:Date.now()-1800000,read:false,starred:false},
      {id:2,from:'גוגל',addr:'no-reply@google.com',subject:'כניסה חדשה לחשבון שלך',body:'זיהינו כניסה חדשה.\n\nזמן: היום, 14:32\nמכשיר: Chrome, Windows\nמיקום: תל אביב\n\nאם זה היית אתה — הכל בסדר.\nאם לא — שנה סיסמה מיד.',time:Date.now()-7200000,read:false,starred:false},
      {id:3,from:'YouTube',addr:'noreply@youtube.com',subject:'סרטונים חדשים בשבילך ▶️',body:'שלום,\n\nסרטונים חדשים מחכים לך:\n\n• MrBeast — World\'s Largest Experiment\n• Kurzgesagt — The Last Human\n• Mark Rober — Engineering Tricks\n\nלצפייה — פתח YouTube.',time:Date.now()-86400000,read:true,starred:false},
      {id:4,from:'Spotify',addr:'no-reply@spotify.com',subject:'רשימת ניגון חדשה בשבילך 🎵',body:'שלום,\n\nמצאנו שירים שאוהבים אנשים עם טעם דומה לשלך:\n\n🎵 Blinding Lights – The Weeknd\n🎵 As It Was – Harry Styles\n🎵 Heat Waves – Glass Animals\n\nפתח את Spotify כדי לשמוע.',time:Date.now()-172800000,read:true,starred:true},
    ],
    sent:[],drafts:[],trash:[]
  };
  save();
}

let folder='inbox', activeId=null;

function save(){localStorage.setItem('bmail2',JSON.stringify(data));}
function getMails(f){
  if(f==='starred') return [...data.inbox,...data.sent].filter(m=>m.starred);
  return data[f]||[];
}
function timeStr(ts){
  const diff=Date.now()-ts;
  if(diff<3600000) return Math.floor(diff/60000)+'ד׳';
  if(diff<86400000) return Math.floor(diff/3600000)+'ש׳';
  if(diff<604800000) return Math.floor(diff/86400000)+'י׳';
  return new Date(ts).toLocaleDateString('he-IL');
}

function render(){
  const mails=getMails(folder);
  const el=document.getElementById('mail-items');
  const uc=data.inbox.filter(m=>!m.read).length;
  const badge=document.getElementById('unread-badge');
  badge.textContent=uc; badge.style.display=uc?'':'none';

  if(!mails.length){
    el.innerHTML='<div style="text-align:center;padding:48px 20px;color:#94a3b8;font-size:13px">📭 ריק</div>';
    return;
  }
  el.innerHTML=mails.map(m=>`
    <div class="mail-item${m.read?'':' unread'}${activeId===m.id?' active':''}" onclick="openMail(${m.id})">
      ${!m.read?'<div class="unread-dot"></div>':''}
      <div class="mi-row1">
        <span class="mi-from">${m.from}</span>
        <span class="mi-time">${m.starred?'⭐ ':''}${timeStr(m.time)}</span>
      </div>
      <div class="mi-subject">${m.subject}</div>
      <div class="mi-preview">${m.body.replace(/\n/g,' ').slice(0,58)}…</div>
    </div>`).join('');
}

function setFolder(f,el){
  folder=f; activeId=null;
  document.querySelectorAll('.folder').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  const titles={inbox:'דואר נכנס',starred:'מסומנים',sent:'נשלח',drafts:'טיוטות',trash:'אשפה'};
  document.getElementById('folder-title').textContent=titles[f];
  document.getElementById('empty-state').style.display='flex';
  document.getElementById('mail-view').style.display='none';
  render();
}

function openMail(id){
  const m=getMails(folder).find(x=>x.id===id); if(!m) return;
  m.read=true; activeId=id; save(); render();

  document.getElementById('empty-state').style.display='none';
  const mv=document.getElementById('mail-view');
  mv.style.display='flex'; mv.style.flexDirection='column';

  const init=m.from.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('mail-content').innerHTML=`
    <div class="mail-subject-h">${m.subject}</div>
    <div class="mail-meta-row">
      <div class="mail-av" style="background:${avatarBg(m.from)}">${init}</div>
      <div>
        <div class="meta-name">${m.from}</div>
        <div class="meta-addr">${m.addr}</div>
      </div>
      <div class="meta-date">${new Date(m.time).toLocaleString('he-IL')}</div>
    </div>
    <div class="mail-body-text">${m.body}</div>`;
}

function deleteMail(){
  if(!activeId) return;
  const arr=getMails(folder), idx=arr.findIndex(m=>m.id===activeId);
  if(idx>-1){
    const [m]=arr.splice(idx,1);
    if(folder!=='trash') data.trash.unshift(m);
    save(); activeId=null;
    document.getElementById('empty-state').style.display='flex';
    document.getElementById('mail-view').style.display='none';
    render(); toast('🗑️ הועבר לאשפה');
  }
}
function starMail(){
  if(!activeId) return;
  const m=[...data.inbox,...data.sent].find(x=>x.id===activeId);
  if(m){m.starred=!m.starred;save();render();toast(m.starred?'⭐ סומן':'סימון הוסר');}
}
function replyMail(){
  if(!activeId) return;
  const m=getMails(folder).find(x=>x.id===activeId); if(!m) return;
  openCompose(m.addr,'השב: '+m.subject,'\n\n— — —\n'+m.body);
}
function forwardMail(){
  if(!activeId) return;
  const m=getMails(folder).find(x=>x.id===activeId); if(!m) return;
  openCompose('','העבר: '+m.subject,'\n\n— — —\nמ: '+m.from+'\n'+m.body);
}

function searchMails(q){
  if(!q){render();return;}
  const filtered=getMails(folder).filter(m=>m.subject.includes(q)||m.from.includes(q)||m.body.includes(q));
  const el=document.getElementById('mail-items');
  if(!filtered.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#94a3b8;font-size:13px">לא נמצאו תוצאות</div>';return;}
  el.innerHTML=filtered.map(m=>`
    <div class="mail-item${m.read?'':' unread'}${activeId===m.id?' active':''}" onclick="openMail(${m.id})">
      ${!m.read?'<div class="unread-dot"></div>':''}
      <div class="mi-row1"><span class="mi-from">${m.from}</span><span class="mi-time">${timeStr(m.time)}</span></div>
      <div class="mi-subject">${m.subject}</div>
      <div class="mi-preview">${m.body.replace(/\n/g,' ').slice(0,58)}…</div>
    </div>`).join('');
}

function openCompose(to='',subject='',body=''){
  document.getElementById('c-to').value=to;
  document.getElementById('c-subject').value=subject;
  document.getElementById('c-body').value=body;
  document.getElementById('compose-overlay').classList.add('show');
  setTimeout(()=>document.getElementById(to?'c-subject':'c-to').focus(),100);
}
function closeCompose(){document.getElementById('compose-overlay').classList.remove('show');}

function sendMail(){
  const to=document.getElementById('c-to').value.trim();
  const subject=document.getElementById('c-subject').value.trim()||'(ללא נושא)';
  const body=document.getElementById('c-body').value.trim();
  if(!to){toast('⚠️ הכנס כתובת נמען');return;}
  if(!body){toast('⚠️ המייל ריק');return;}
  data.sent.unshift({id:Date.now(),from:'אני',addr:'me@bmail.app',to,subject,body,time:Date.now(),read:true,starred:false});
  save(); closeCompose(); toast('📤 המייל נשלח!');
}
function saveDraft(){
  const subject=document.getElementById('c-subject').value||'טיוטה';
  const body=document.getElementById('c-body').value;
  data.drafts.unshift({id:Date.now(),from:'אני',addr:'me@bmail.app',subject,body,time:Date.now(),read:true,starred:false});
  save(); closeCompose(); toast('💾 נשמר כטיוטה');
}

function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},2800);
}

render();
</script>
