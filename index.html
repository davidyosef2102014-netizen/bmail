<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMAIL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
:root{
  --bg:#0f0e17;--surface:#1a1929;--surface2:#242338;--border:rgba(255,255,255,.08);
  --accent:#7c3aed;--accent2:#a78bfa;--text:#f0eeff;--text2:rgba(240,238,255,.55);
  --red:#ef4444;--green:#22c55e;--yellow:#f59e0b;
}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:240px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.logo{padding:20px 18px 14px;font-size:22px;font-weight:900;letter-spacing:-0.5px;}
.logo span{background:linear-gradient(135deg,#7c3aed,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo small{font-size:10px;color:var(--text2);font-weight:400;display:block;margin-top:2px;}

.compose-btn{margin:0 14px 18px;background:linear-gradient(135deg,#7c3aed,#a78bfa);border:none;border-radius:12px;color:#fff;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:opacity .2s;}
.compose-btn:hover{opacity:.88;}

.folder{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:13.5px;color:var(--text2);cursor:pointer;border-radius:10px;margin:1px 8px;transition:background .15s,color .15s;}
.folder:hover{background:rgba(124,58,237,.15);color:var(--text);}
.folder.active{background:rgba(124,58,237,.22);color:#a78bfa;font-weight:600;}
.folder .count{margin-right:auto;background:var(--accent);color:#fff;font-size:10px;padding:2px 7px;border-radius:20px;}
.folder .icon{font-size:16px;width:20px;text-align:center;}

.sidebar-sep{height:1px;background:var(--border);margin:10px 14px;}

.account{display:flex;align-items:center;gap:10px;padding:14px 18px;margin-top:auto;border-top:1px solid var(--border);}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a78bfa);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
.account-info{font-size:12px;}
.account-name{font-weight:600;color:var(--text);}
.account-addr{color:var(--text2);}

/* MAIL LIST */
#maillist{width:320px;border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.list-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;border-bottom:1px solid var(--border);}
.list-title{font-size:16px;font-weight:700;}
#search-bar{display:flex;align-items:center;gap:8px;margin:10px 12px;background:var(--surface2);border-radius:10px;padding:8px 12px;border:1px solid var(--border);}
#search-bar input{background:none;border:none;color:var(--text);font-size:13px;outline:none;flex:1;direction:rtl;}
#search-bar input::placeholder{color:var(--text2);}

.mail-item{padding:13px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative;}
.mail-item:hover{background:var(--surface2);}
.mail-item.active{background:rgba(124,58,237,.18);border-right:3px solid var(--accent2);}
.mail-item.unread .mi-subject{font-weight:700;color:var(--text);}
.mi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.mi-from{font-size:13px;font-weight:600;color:var(--text);}
.mi-time{font-size:11px;color:var(--text2);}
.mi-subject{font-size:12.5px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.mi-preview{font-size:11.5px;color:var(--text2);opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.unread-dot{width:8px;height:8px;background:var(--accent2);border-radius:50%;position:absolute;top:16px;left:12px;}

.mail-items-scroll{flex:1;overflow-y:auto;}
.mail-items-scroll::-webkit-scrollbar{width:4px;}
.mail-items-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* READING PANE */
#reading{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.reading-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);gap:12px;}
.reading-empty .big-icon{font-size:64px;opacity:.3;}

#mail-view{display:none;flex-direction:column;flex:1;overflow:hidden;}
.mail-toolbar{display:flex;align-items:center;gap:8px;padding:14px 20px;border-bottom:1px solid var(--border);}
.tb-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;}
.tb-btn:hover{background:rgba(124,58,237,.2);color:var(--text);border-color:rgba(124,58,237,.4);}
.tb-btn.danger:hover{background:rgba(239,68,68,.2);color:#ef4444;border-color:rgba(239,68,68,.3);}

.mail-scroll{flex:1;overflow-y:auto;padding:24px 28px;}
.mail-scroll::-webkit-scrollbar{width:4px;}
.mail-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.mail-subject-big{font-size:22px;font-weight:700;margin-bottom:16px;line-height:1.3;}
.mail-meta{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.mail-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;}
.mail-from-info .name{font-size:14px;font-weight:600;}
.mail-from-info .addr{font-size:12px;color:var(--text2);}
.mail-date-right{margin-right:auto;font-size:12px;color:var(--text2);}
.mail-body{font-size:15px;line-height:1.8;color:rgba(240,238,255,.85);white-space:pre-wrap;}

/* AI BADGE */
.ai-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(167,139,250,.2));border:1px solid rgba(167,139,250,.3);border-radius:20px;padding:3px 10px;font-size:11px;color:#a78bfa;margin-bottom:16px;}

/* COMPOSE */
#compose-overlay{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);align-items:flex-end;justify-content:flex-start;padding:20px;}
#compose-overlay.show{display:flex;}
#compose-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:520px;box-shadow:0 32px 80px rgba(0,0,0,.7);display:flex;flex-direction:column;overflow:hidden;animation:slideUp .25s cubic-bezier(.34,1.56,.64,1);}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.compose-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);}
.compose-header h3{font-size:15px;font-weight:700;}
.compose-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1;padding:0 4px;}
.compose-close:hover{color:var(--red);}
.compose-field{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border);}
.compose-label{font-size:12px;color:var(--text2);width:28px;flex-shrink:0;}
.compose-field input{background:none;border:none;color:var(--text);font-size:13.5px;outline:none;flex:1;direction:rtl;}
.compose-field input::placeholder{color:var(--text2);}
#compose-body{background:none;border:none;color:var(--text);font-size:14px;outline:none;padding:16px 18px;min-height:180px;resize:none;width:100%;line-height:1.7;direction:rtl;}
#compose-body::placeholder{color:var(--text2);}

/* AI COMPOSE */
#ai-compose-panel{display:none;margin:0 14px 10px;background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(167,139,250,.08));border:1px solid rgba(124,58,237,.3);border-radius:12px;padding:14px;}
#ai-compose-panel.show{display:block;}
#ai-compose-panel label{font-size:12px;color:#a78bfa;font-weight:600;display:block;margin-bottom:6px;}
#ai-prompt{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(124,58,237,.3);border-radius:8px;color:var(--text);padding:9px 12px;font-size:13px;resize:none;outline:none;direction:rtl;}
#ai-prompt::placeholder{color:var(--text2);}
.ai-gen-btn{margin-top:8px;background:linear-gradient(135deg,#7c3aed,#a78bfa);border:none;border-radius:8px;color:#fff;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:opacity .2s;}
.ai-gen-btn:hover{opacity:.85;}
.ai-gen-btn.loading{opacity:.6;pointer-events:none;}

.compose-footer{display:flex;align-items:center;gap:8px;padding:12px 16px;border-top:1px solid var(--border);}
.send-btn{background:linear-gradient(135deg,#7c3aed,#a78bfa);border:none;border-radius:10px;color:#fff;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .2s;}
.send-btn:hover{opacity:.87;}
.ai-btn{background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.4);border-radius:10px;color:#a78bfa;padding:9px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;font-weight:600;}
.ai-btn:hover{background:rgba(124,58,237,.35);}

/* NOTIF */
.notif{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;box-shadow:0 16px 48px rgba(0,0,0,.5);animation:notifIn .3s ease;white-space:nowrap;}
@keyframes notifIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo"><span>BMAIL</span><small>מייל חכם מבית BirgsOS</small></div>

  <button class="compose-btn" onclick="openCompose()">
    <span style="font-size:18px">✏️</span> כתוב מייל
  </button>

  <div class="folder active" onclick="switchFolder('inbox',this)" id="f-inbox">
    <span class="icon">📥</span> דואר נכנס
    <span class="count" id="unread-count">0</span>
  </div>
  <div class="folder" onclick="switchFolder('starred',this)" id="f-starred">
    <span class="icon">⭐</span> מסומנים
  </div>
  <div class="folder" onclick="switchFolder('sent',this)" id="f-sent">
    <span class="icon">📤</span> נשלח
  </div>
  <div class="folder" onclick="switchFolder('drafts',this)" id="f-drafts">
    <span class="icon">📝</span> טיוטות
  </div>
  <div class="folder" onclick="switchFolder('trash',this)" id="f-trash">
    <span class="icon">🗑️</span> אשפה
  </div>

  <div class="sidebar-sep"></div>

  <div class="folder" onclick="openCompose({ai:true})">
    <span class="icon">🤖</span> כתוב עם AI
  </div>

  <div class="account">
    <div class="avatar">B</div>
    <div class="account-info">
      <div class="account-name">BirgsOS User</div>
      <div class="account-addr">bmail@birgsol.app</div>
    </div>
  </div>
</div>

<!-- MAIL LIST -->
<div id="maillist">
  <div class="list-header">
    <span class="list-title" id="folder-title">דואר נכנס</span>
    <button class="tb-btn" onclick="refreshMails()" title="רענן">↻</button>
  </div>
  <div id="search-bar">
    <span style="color:var(--text2);font-size:14px">🔍</span>
    <input type="text" placeholder="חפש מיילים..." oninput="searchMails(this.value)">
  </div>
  <div class="mail-items-scroll" id="mail-items"></div>
</div>

<!-- READING PANE -->
<div id="reading">
  <div class="reading-empty" id="reading-empty">
    <div class="big-icon">📬</div>
    <div style="font-size:16px;font-weight:600">בחר מייל לקריאה</div>
    <div style="font-size:13px">או כתוב מייל חדש</div>
  </div>
  <div id="mail-view">
    <div class="mail-toolbar">
      <button class="tb-btn" onclick="replyMail()">↩ השב</button>
      <button class="tb-btn" onclick="forwardMail()">↪ העבר</button>
      <button class="tb-btn" onclick="starMail()">⭐ סמן</button>
      <button class="tb-btn danger" onclick="deleteMail()">🗑 מחק</button>
    </div>
    <div class="mail-scroll" id="mail-content"></div>
  </div>
</div>

<!-- COMPOSE -->
<div id="compose-overlay" onclick="if(event.target===this)closeCompose()">
  <div id="compose-box">
    <div class="compose-header">
      <h3>✏️ מייל חדש</h3>
      <button class="compose-close" onclick="closeCompose()">✕</button>
    </div>
    <div class="compose-field">
      <span class="compose-label">אל:</span>
      <input type="email" id="c-to" placeholder="כתובת המייל של הנמען...">
    </div>
    <div class="compose-field">
      <span class="compose-label">נושא:</span>
      <input type="text" id="c-subject" placeholder="נושא המייל...">
    </div>
    <div id="ai-compose-panel">
      <label>🤖 AI Writer — תאר מה תרצה שהמייל יגיד:</label>
      <textarea id="ai-prompt" rows="2" placeholder="לדוגמה: מייל מקצועי לבקש דחיית פגישה ליום שישי..."></textarea>
      <button class="ai-gen-btn" onclick="generateAI()" id="ai-gen-btn">✨ כתוב בשבילי</button>
    </div>
    <textarea id="compose-body" placeholder="כתוב את המייל שלך כאן..."></textarea>
    <div class="compose-footer">
      <button class="send-btn" onclick="sendMail()">📤 שלח</button>
      <button class="ai-btn" onclick="toggleAI()">🤖 AI Writer</button>
      <button class="tb-btn" onclick="saveDraft()" style="margin-right:auto">💾 שמור טיוטה</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──
const COLORS=['linear-gradient(135deg,#7c3aed,#a78bfa)','linear-gradient(135deg,#2563eb,#60a5fa)','linear-gradient(135deg,#16a34a,#4ade80)','linear-gradient(135deg,#dc2626,#f87171)','linear-gradient(135deg,#d97706,#fbbf24)','linear-gradient(135deg,#0891b2,#22d3ee)'];
function avatarColor(name){return COLORS[name.charCodeAt(0)%COLORS.length];}

let allMails=JSON.parse(localStorage.getItem('bmail_v1')||'null');
if(!allMails){
  allMails={
    inbox:[
      {id:1,from:'צוות BirgsOS',addr:'team@birgsol.app',subject:'ברוך הבא ל-BMAIL! 🎉',body:'שלום!\n\nברוך הבא ל-BMAIL — מייל חכם מבית BirgsOS.\n\nעכשיו יש לך:\n✉️ תיבת מייל מלאה\n🤖 AI Writer שכותב בשבילך\n⭐ סימון מיילים חשובים\n\nנשמח לשמוע מה אתה חושב!\n\nצוות BMAIL',time:Date.now()-3600000,read:false,starred:false,ai:true},
      {id:2,from:'גוגל',addr:'no-reply@google.com',subject:'אבטחת חשבון — כניסה חדשה',body:'זיהינו כניסה חדשה לחשבון שלך.\n\nזמן: היום 14:32\nמכשיר: Chrome on Windows\nמיקום: תל אביב, ישראל\n\nאם זה היית אתה — אין צורך לעשות כלום.\nאם לא — שנה את הסיסמה מיד.',time:Date.now()-7200000,read:false,starred:false,ai:false},
      {id:3,from:'YouTube',addr:'noreply@youtube.com',subject:'סרטונים חדשים ממנויים שלך',body:'מה חדש בערוצים שאתה עוקב אחריהם:\n\n▶ MrBeast — "$1 vs $1,000,000 Hotel Room!"\n▶ Kurzgesagt — "Why Are You Alive?"\n▶ Mark Rober — "Glitter Bomb 5.0"\n\nלצפייה לחץ על הקישורים ב-YouTube.',time:Date.now()-86400000,read:true,starred:false,ai:false},
      {id:4,from:'BIRGSOL AI',addr:'ai@birgsol.app',subject:'עדכון שבועי מ-AI שלך 🤖',body:'שלום,\n\nהשבוע ה-AI שלך עזר עם:\n• 3 מיילים שנכתבו אוטומטית\n• תסכום של 5 שיחות\n• 12 הצעות לשיפור\n\nשמור להשתמש בכפתור "AI Writer" בכתיבת מיילים!',time:Date.now()-172800000,read:true,starred:true,ai:true},
    ],
    sent:[],
    drafts:[],
    trash:[],
    starred:[]
  };
  save();
}

let currentFolder='inbox';
let currentMailId=null;

function save(){localStorage.setItem('bmail_v1',JSON.stringify(allMails));}
function getMails(folder){
  if(folder==='starred') return [...allMails.inbox,...allMails.sent].filter(m=>m.starred);
  return allMails[folder]||[];
}

function timeAgo(ts){
  const d=Date.now()-ts, m=Math.floor(d/60000), h=Math.floor(d/3600000), day=Math.floor(d/86400000);
  if(m<1)return 'עכשיו';
  if(m<60)return `לפני ${m} דק׳`;
  if(h<24)return `לפני ${h} שע׳`;
  if(day<7)return `לפני ${day} ימים`;
  return new Date(ts).toLocaleDateString('he-IL');
}

// ── RENDER ──
function renderList(mails){
  const el=document.getElementById('mail-items');
  if(!mails||!mails.length){
    el.innerHTML=`<div style="text-align:center;padding:40px 20px;color:var(--text2);font-size:13px">אין מיילים בתיקייה זו</div>`;
    return;
  }
  el.innerHTML=mails.map(m=>`
    <div class="mail-item${m.read?' ':' unread'}${currentMailId===m.id?' active':''}" onclick="openMail(${m.id},'${currentFolder}')">
      ${!m.read?'<div class="unread-dot"></div>':''}
      <div class="mi-top">
        <span class="mi-from">${m.from}</span>
        <span class="mi-time">${timeAgo(m.time)}</span>
      </div>
      <div class="mi-subject">${m.starred?'⭐ ':''}${m.subject}</div>
      <div class="mi-preview">${m.body.replace(/\n/g,' ').substring(0,60)}...</div>
    </div>
  `).join('');
  // unread count
  const uc=allMails.inbox.filter(m=>!m.read).length;
  document.getElementById('unread-count').textContent=uc;
  document.getElementById('unread-count').style.display=uc?'':'none';
}

function switchFolder(folder,el){
  currentFolder=folder;
  currentMailId=null;
  document.querySelectorAll('.folder').forEach(f=>f.classList.remove('active'));
  el.classList.add('active');
  const titles={inbox:'דואר נכנס',sent:'נשלח',drafts:'טיוטות',trash:'אשפה',starred:'מסומנים'};
  document.getElementById('folder-title').textContent=titles[folder]||folder;
  document.getElementById('reading-empty').style.display='flex';
  document.getElementById('mail-view').style.display='none';
  renderList(getMails(folder));
}

function openMail(id, folder){
  const mails=getMails(folder);
  const m=mails.find(x=>x.id===id);
  if(!m) return;
  m.read=true; save();
  currentMailId=id;
  renderList(getMails(folder));

  document.getElementById('reading-empty').style.display='none';
  const mv=document.getElementById('mail-view');
  mv.style.display='flex'; mv.style.flexDirection='column';

  const initials=m.from.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('mail-content').innerHTML=`
    ${m.ai?'<div class="ai-badge">🤖 נכתב בעזרת AI</div>':''}
    <div class="mail-subject-big">${m.subject}</div>
    <div class="mail-meta">
      <div class="mail-avatar" style="background:${avatarColor(m.from)}">${initials}</div>
      <div class="mail-from-info">
        <div class="name">${m.from}</div>
        <div class="addr">${m.addr}</div>
      </div>
      <div class="mail-date-right">${new Date(m.time).toLocaleString('he-IL')}</div>
    </div>
    <div class="mail-body">${m.body}</div>
  `;
}

// ── ACTIONS ──
function deleteMail(){
  if(!currentMailId) return;
  const mails=getMails(currentFolder);
  const idx=mails.findIndex(m=>m.id===currentMailId);
  if(idx>-1){
    const [m]=mails.splice(idx,1);
    if(currentFolder!=='trash') allMails.trash.unshift(m);
    save();
    currentMailId=null;
    document.getElementById('reading-empty').style.display='flex';
    document.getElementById('mail-view').style.display='none';
    renderList(getMails(currentFolder));
    showNotif('🗑️ המייל הועבר לאשפה');
  }
}
function starMail(){
  if(!currentMailId) return;
  const m=[...allMails.inbox,...allMails.sent].find(x=>x.id===currentMailId);
  if(m){m.starred=!m.starred;save();renderList(getMails(currentFolder));showNotif(m.starred?'⭐ סומן':'הסימון הוסר');}
}
function replyMail(){
  if(!currentMailId) return;
  const m=getMails(currentFolder).find(x=>x.id===currentMailId);
  if(!m) return;
  openCompose({to:m.addr,subject:'השב: '+m.subject,body:'\n\n---\n'+m.body});
}
function forwardMail(){
  if(!currentMailId) return;
  const m=getMails(currentFolder).find(x=>x.id===currentMailId);
  if(!m) return;
  openCompose({subject:'העבר: '+m.subject,body:'\n\n---\nמ: '+m.from+'\n'+m.body});
}
function refreshMails(){renderList(getMails(currentFolder));showNotif('✅ עודכן');}

// ── SEARCH ──
function searchMails(q){
  if(!q){renderList(getMails(currentFolder));return;}
  const filtered=getMails(currentFolder).filter(m=>
    m.subject.includes(q)||m.from.includes(q)||m.body.includes(q)
  );
  renderList(filtered);
}

// ── COMPOSE ──
function openCompose(opts={}){
  document.getElementById('c-to').value=opts.to||'';
  document.getElementById('c-subject').value=opts.subject||'';
  document.getElementById('compose-body').value=opts.body||'';
  document.getElementById('ai-compose-panel').classList[opts.ai?'add':'remove']('show');
  document.getElementById('compose-overlay').classList.add('show');
  setTimeout(()=>document.getElementById(opts.to?'c-subject':'c-to').focus(),100);
}
function closeCompose(){document.getElementById('compose-overlay').classList.remove('show');}

function sendMail(){
  const to=document.getElementById('c-to').value.trim();
  const subject=document.getElementById('c-subject').value.trim()||'(ללא נושא)';
  const body=document.getElementById('compose-body').value.trim();
  if(!to){showNotif('⚠️ הכנס כתובת נמען');return;}
  if(!body){showNotif('⚠️ המייל ריק');return;}
  const m={id:Date.now(),from:'אני',addr:'bmail@birgsol.app',to,subject,body,time:Date.now(),read:true,starred:false,ai:aiWasUsed};
  allMails.sent.unshift(m); save();
  closeCompose(); aiWasUsed=false;
  showNotif('📤 המייל נשלח!');
}

function saveDraft(){
  const subject=document.getElementById('c-subject').value||'טיוטה ללא נושא';
  const body=document.getElementById('compose-body').value;
  const m={id:Date.now(),from:'אני',addr:'bmail@birgsol.app',subject,body,time:Date.now(),read:true,starred:false,ai:false};
  allMails.drafts.unshift(m); save();
  closeCompose(); showNotif('💾 נשמר כטיוטה');
}

// ── AI ──
let aiWasUsed=false;
function toggleAI(){
  document.getElementById('ai-compose-panel').classList.toggle('show');
}

const aiTemplates=[
  {keys:['פגישה','דחה','ביטול'],template:(s)=>`שלום,\n\nקודם כל תודה על התיאום.\n\nלצערי, אני נאלץ לדחות את הפגישה שתוכננה. אבקש לתאם מועד חלופי שיתאים לשני הצדדים.\n\nאשמח אם תוכל להציע מועדים נוחים לשבוע הקרוב.\n\nמצטער על אי הנוחות,\nBirgs`},
  {keys:['תודה','הודיה','מצוין'],template:(s)=>`שלום,\n\nרציתי לקחת רגע ולהודות לך באופן אישי.\n\n${s||'העבודה המשותפת שלנו הייתה מצוינת, ואני מעריך מאוד את המאמץ שהשקעת.'}\n\nאני בטוח שנמשיך לעבוד יחד בצורה נהדרת.\n\nתודה רבה,\nBirgs`},
  {keys:['עבודה','שאלה','בקשה'],template:(s)=>`שלום,\n\nאני פונה אליך בנוגע ל${s||'הנושא שדיברנו עליו'}.\n\nהייתי שמח לקבל ממך פרטים נוספים ולדון בנושא.\n\nאשמח לשמוע את דעתך ולתאם שיחה בנוחות שלך.\n\nבברכה,\nBirgs`},
  {keys:[''],template:(s)=>`שלום,\n\n${s||'כתבתי לך כדי לשתף אותך במספר עדכונים חשובים.'}\n\nנשמח לשמוע ממך ולהמשיך את השיחה.\n\nבברכה,\nBirgs`},
];

function generateAI(){
  const prompt=document.getElementById('ai-prompt').value.trim();
  const subject=document.getElementById('c-subject').value.trim();
  const btn=document.getElementById('ai-gen-btn');
  btn.textContent='⏳ כותב...'; btn.classList.add('loading');

  setTimeout(()=>{
    const combined=(prompt+' '+subject).toLowerCase();
    const tpl=aiTemplates.find(t=>t.keys.some(k=>k&&combined.includes(k)))||aiTemplates[aiTemplates.length-1];
    document.getElementById('compose-body').value=tpl.template(prompt);
    if(!subject && prompt) document.getElementById('c-subject').value=prompt.split(' ').slice(0,4).join(' ');
    btn.textContent='✨ כתוב בשבילי'; btn.classList.remove('loading');
    document.getElementById('ai-compose-panel').classList.remove('show');
    aiWasUsed=true;
    showNotif('🤖 AI כתב את המייל!');
  },1200);
}

// ── NOTIF ──
function showNotif(msg){
  document.querySelectorAll('.notif').forEach(n=>n.remove());
  const n=document.createElement('div'); n.className='notif'; n.textContent=msg;
  document.body.appendChild(n);
  setTimeout(()=>{n.style.opacity='0';n.style.transition='opacity .3s';setTimeout(()=>n.remove(),300);},3000);
}

// ── INIT ──
renderList(getMails('inbox'));
</script>
</body>
